name: Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - "claude/reupload-release-*"
      - "claude/update-release-*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=V1.0.0" >> "$GITHUB_OUTPUT"
            echo "tag=V1.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Package plugin
        run: |
          zip -r "dogearmanager-${{ steps.version.outputs.version }}.zip" dogearmanager.koplugin/

      - name: Delete existing release assets
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          RELEASE_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          if [ -n "$RELEASE_ID" ]; then
            ASSET_IDS=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
              | python3 -c "import sys,json; [print(a['id']) for a in json.load(sys.stdin)]" 2>/dev/null)
            for AID in $ASSET_IDS; do
              curl -s -X DELETE \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/assets/${AID}"
            done
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          name: "Dogear Manager ${{ steps.version.outputs.version }}"
          body: |
            ## Installation

            1. Download `dogearmanager-${{ steps.version.outputs.version }}.zip` below
            2. Extract the `dogearmanager.koplugin` folder
            3. Copy `dogearmanager.koplugin` into your KOReader plugins directory (e.g. `/mnt/us/koreader/plugins/`)
            4. Restart KOReader — the plugin appears under **Tools → Dogear Manager**

            Requires KOReader v2025.10 or later.
          files: "dogearmanager-${{ steps.version.outputs.version }}.zip"
          draft: false
          prerelease: false
